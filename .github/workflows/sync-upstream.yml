# Daily sync of the john7rho/superset fork from apache/superset.
# This file lives in the FORK at .github/workflows/sync-upstream.yml
# (a copy is kept here in the take-home repo for reference).
name: Sync fork with upstream

on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC daily (~6am PT / 9am ET) — every morning
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync default branch from apache/superset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo sync ${{ github.repository }} --source apache/superset --force
